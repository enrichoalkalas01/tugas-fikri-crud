apiVersion: apps/v1
kind: Deployment
metadata:
    name: tugas-fikri
    labels:
        app: tugas-fikri
spec:
    replicas: 1
    selector:
        matchLabels:
            app: tugas-fikri
    template:
        metadata:
            labels:
                app: tugas-fikri
        spec:
            nodeSelector:
                kubernetes.io/hostname: aml-s9xx-box
            containers:
                - name: tugas-fikri
                  image: 192.168.20.21/other/tugas-fikri:arm64
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 80
                  resources:
                      requests:
                          memory: "128Mi"
                          cpu: "100m"
                      limits:
                          memory: "256Mi"
                          cpu: "200m"
            # Uncomment jika pakai private registry dengan autentikasi
            # imagePullSecrets:
            # - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
    name: tugas-fikri-service
spec:
    type: NodePort
    selector:
        app: tugas-fikri
    ports:
        - protocol: TCP
          port: 80
          targetPort: 80
          nodePort: 30080



# =================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tugas-fikri
  labels:
    app: tugas-fikri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tugas-fikri
  template:
    metadata:
      labels:
        app: tugas-fikri
    spec:
      nodeSelector:
        kubernetes.io/hostname: aml-s9xx-box
      containers:
      - name: tugas-fikri
        image: 192.168.20.21/other/tugas-fikri:arm64
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "0.5"
          limits:
            memory: "128Mi"
            cpu: "0.5"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: harbor-secret
---
apiVersion: v1
kind: Service
metadata:
  name: tugas-fikri-service
  labels:
    app: tugas-fikri
spec:
  type: NodePort
  selector:
    app: tugas-fikri
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
