services:

  app:
    build: .
    container_name: tugas-fikri-app
    ports:
      - "8050:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: tugas_data
      DB_USER: fikri
      DB_PASSWORD: password123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  db:
    image: mariadb:11
    container_name: tugas-fikri-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tugas_data
      MYSQL_USER: fikri
      MYSQL_PASSWORD: password123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./tugas_data.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  db_data:
