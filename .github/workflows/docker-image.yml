name: Tugas Fikri CI/CD Pipeline

on:
    push:
        branches: ["master", "main"]
    pull_request:
        branches: ["master", "main"]

env:
    REGISTRY: ${{ vars.registry }}
    REGISTRY_PROJECT: ${{ vars.registry_project }}
    IMAGE_NAME: "tugas-fikri"

jobs:
    build-tugas-fikri:
        runs-on: self-hosted
        outputs:
            image-tag: ${{ steps.meta.outputs.tags }}
            image-digest: ${{ steps.build.outputs.digest }}

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure Docker for private registry
              run: |
                  # Copy certificate ke Docker directory tanpa restart
                  sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}

                  # Copy certificate dari home directory (sesuaikan path jika perlu)
                  sudo cp ~/ca.crt /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt || echo "Certificate not found, skipping"

                  # Set permission yang benar
                  sudo chmod 644 /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt || true

                  echo "Certificate installed for Docker registry ${{ env.REGISTRY }}"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  buildkitd-flags: --allow-insecure-entitlement security.insecure
                  config-inline: |
                      [registry."${{ env.REGISTRY }}"]
                        ca=["/etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt"]

            - name: Debug environment
              run: |
                  echo "Runner environment:"
                  whoami
                  docker --version
                  echo "Registry: ${{ env.REGISTRY }}"
                  echo "Project: ${{ env.REGISTRY_PROJECT }}"
                  echo "Image: ${{ env.IMAGE_NAME }}"
                  echo "=== Certificate check ==="
                  ls -la /etc/docker/certs.d/${{ env.REGISTRY }}/ || true
                  echo "=== Test registry connection ==="
                  curl --cacert /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt https://${{ env.REGISTRY }}/v2/ || true

            - name: Log in to private registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix={{branch}}-
                      type=ref,event=pr

            - name: Build and push Docker image
              id: build
              run: |
                  # Build image
                  docker build \
                    -t ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest \
                    -f ./Dockerfile \
                    .

                  # Push dengan certificate yang sudah dikonfigurasi
                  docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest

                  # Get image digest untuk output
                  IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || echo "digest-unavailable")
                  echo "digest=${IMAGE_DIGEST}" >> $GITHUB_OUTPUT

                  echo "Docker image built and pushed successfully!"

            - name: Build Summary
              run: |
                  echo "### Docker Build Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image**: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
                  echo "- **Registry**: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Digest**: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
